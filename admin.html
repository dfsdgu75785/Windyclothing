<script>
// ============================================
// GOOGLE SHEETS CONFIGURATION
// ============================================
const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbzBK0RLGhMVGVkydQM5A4uSlSxg68dovXK4WHCEPyu2wIUXwkTLJixeK_wbixCw7uVk/exec';

// ── AUTH ──
const CREDS_KEY = 'windy_admin_creds';
function getCreds() { return JSON.parse(localStorage.getItem(CREDS_KEY) || '{"user":"admin","pass":"windy2026"}'); }

function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const c = getCreds();
  if (u === c.user && p === c.pass) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadAll();
    startClock();
  } else {
    document.getElementById('l-err').style.display = 'block';
    document.getElementById('l-pass').value = '';
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function changePass() {
  const cur = document.getElementById('s-cur-pass').value;
  const nw = document.getElementById('s-new-pass').value;
  const cn = document.getElementById('s-con-pass').value;
  const c = getCreds();
  if (cur !== c.pass) { adm_toast('Current password incorrect'); return; }
  if (nw.length < 6) { adm_toast('Password must be 6+ characters'); return; }
  if (nw !== cn) { adm_toast('Passwords do not match'); return; }
  localStorage.setItem(CREDS_KEY, JSON.stringify({ user: c.user, pass: nw }));
  adm_toast('Password updated ✓');
  ['s-cur-pass', 's-new-pass', 's-con-pass'].forEach(id => document.getElementById(id).value = '');
}

// ── FORMATTING FUNCTIONS ──
function fmtPrice(n) { return 'LKR ' + Number(n).toLocaleString(); }
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
function statusClass(s) { return 's-' + s.toLowerCase(); }
const PM_LABELS = { card: '💳 Card', cod: '💵 COD', bank: '🏦 Bank' };

let filterStatus = 'all';
let currentOrders = [];

// ── FETCH ORDERS FROM GOOGLE SHEETS ──
async function fetchOrdersFromSheets() {
  try {
    const response = await fetch(`${SHEETS_API_URL}?action=getOrders`);
    const result = await response.json();
    
    if (result.success && result.orders) {
      // Convert Google Sheets data to order format
      return result.orders.map(row => ({
        ref: row['Order ID'] || '',
        date: row['Date'] || '',
        status: row['Status'] || 'Pending',
        customer: {
          name: row['Customer Name'] || '',
          phone: row['Phone'] || '',
          email: row['Email'] || '',
          address: row['Address'] || '',
          city: row['City'] || '',
          province: row['Province'] || ''
        },
        items: (row['Items'] || '').split(', ').filter(i => i).map(item => {
          const match = item.match(/(.+) \(([^)]+)\) x(\d+)/);
          if (match) {
            return { name: match[1], size: match[2], qty: parseInt(match[3]), price: 0, icon: '📦' };
          }
          return { name: item, qty: 1, size: 'M', price: 0, icon: '📦' };
        }),
        subtotal: parseFloat(row['Subtotal']) || 0,
        delivery: parseFloat(row['Delivery']) || 350,
        total: parseFloat(row['Total']) || 0,
        payment: row['Payment Method'] || ''
      }));
    }
    return [];
  } catch (error) {
    console.error('Error fetching from Google Sheets:', error);
    return [];
  }
}

// ── UPDATE ORDER STATUS IN GOOGLE SHEETS ──
async function updateStatusInSheets(orderId, newStatus) {
  try {
    const formData = new URLSearchParams();
    formData.append('action', 'updateStatus');
    formData.append('orderId', orderId);
    formData.append('status', newStatus);
    
    const response = await fetch(SHEETS_API_URL, {
      method: 'POST',
      body: formData
    });
    
    const result = await response.json();
    return result.success;
  } catch (error) {
    console.error('Error updating status:', error);
    return false;
  }
}

// ── RENDER ORDERS TABLE ──
function renderOrdersTable(orders) {
  const tb = document.getElementById('orders-tbody');
  if (!orders.length) {
    tb.innerHTML = '<tr><td colspan="10"><div class="empty-state"><p>No orders yet — place an order from the store!</p></div></td></tr>';
    return;
  }
  
  tb.innerHTML = orders.map(o => `
    <tr>
      <td style="font-family:\'DM Mono\',monospace;font-weight:400">${o.ref}</td>
      <td style="white-space:nowrap;color:var(--mid);font-size:10px">${fmtDate(o.date)}</td>
      <td><strong style="font-family:\'Cormorant Garamond\',serif;font-size:14px">${o.customer?.name || '—'}</strong></td>
      <td style="color:var(--mid)">${o.customer?.phone || '—'}</td>
      <td style="color:var(--mid)">${o.customer?.city || '—'}</td>
      <td style="color:var(--mid)">${o.items?.length || 0} item${o.items?.length !== 1 ? 's' : ''}</td>
      <td style="font-family:\'DM Mono\',monospace">${fmtPrice(o.total)}</td>
      <td><span class="pay-badge">${PM_LABELS[o.payment] || o.payment}</span></td>
      <td><span class="status-pill ${statusClass(o.status)}">${o.status}</span></td>
      <td><div class="action-btns">
        <button class="act-btn primary" onclick="openModal('${o.ref}')">View</button>
        <button class="act-btn danger" onclick="cancelOrder('${o.ref}')">✕</button>
      </div></td>
    </tr>
  `).join('');
}

// ── RENDER STATS ──
function renderStats(orders) {
  const total = orders.reduce((s, o) => s + (o.total || 0), 0);
  const pending = orders.filter(o => o.status === 'Pending').length;
  const today = orders.filter(o => new Date(o.date).toDateString() === new Date().toDateString()).length;
  
  document.getElementById('order-stats').innerHTML = `
    <div class="stat-card"><div class="sc-label">Total Orders</div><div class="sc-val">${orders.length}</div></div>
    <div class="stat-card"><div class="sc-label">Revenue</div><div class="sc-val sc-accent">${fmtPrice(total)}</div></div>
    <div class="stat-card"><div class="sc-label">Pending</div><div class="sc-val sc-red">${pending}</div></div>
    <div class="stat-card"><div class="sc-label">Today</div><div class="sc-val sc-green">${today}</div></div>`;
  
  const sb = document.getElementById('seed-wrap');
  if (!orders.length) {
    sb.innerHTML = '<div class="seed-banner"><p>No orders found. Place a test order from the store!</p><button class="seed-btn" onclick="seedLocalOrders()">Seed Sample Orders</button></div>';
  } else {
    sb.innerHTML = '';
  }
}

// ── FILTER ORDERS ──
function setFilter(s, btn) {
  filterStatus = s;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  filterOrders();
}

function filterOrders() {
  const q = document.getElementById('search-box').value.toLowerCase();
  const orders = currentOrders;
  const filtered = orders.filter(o => {
    const statusOk = filterStatus === 'all' || o.status === filterStatus;
    const searchOk = !q ||
      (o.ref || '').toLowerCase().includes(q) ||
      (o.customer?.name || '').toLowerCase().includes(q) ||
      (o.customer?.phone || '').includes(q) ||
      (o.customer?.city || '').toLowerCase().includes(q);
    return statusOk && searchOk;
  });
  renderOrdersTable(filtered);
}

// ── LOAD ALL ORDERS ──
async function loadAll() {
  document.getElementById('orders-tbody').innerHTML = '<tr><td colspan="10"><div class="empty-state"><p>Loading orders from Google Sheets...</p></div></td></tr>';
  
  const orders = await fetchOrdersFromSheets();
  currentOrders = orders;
  renderStats(orders);
  renderOrdersTable(orders);
}

// ── OPEN ORDER MODAL ──
function openModal(ref) {
  const o = currentOrders.find(x => x.ref === ref);
  if (!o) return;
  
  document.getElementById('modal-ref').textContent = o.ref;
  const statuses = ['Pending', 'Processing', 'Shipped', 'Delivered', 'Cancelled'];
  
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Customer Details</div>
      <div class="info-grid">
        <div class="info-item"><div class="il">Name</div><div class="iv">${o.customer?.name || '—'}</div></div>
        <div class="info-item"><div class="il">Phone</div><div class="iv">${o.customer?.phone || '—'}</div></div>
        <div class="info-item"><div class="il">Email</div><div class="iv">${o.customer?.email || '—'}</div></div>
        <div class="info-item"><div class="il">City</div><div class="iv">${o.customer?.city || '—'}</div></div>
        <div class="info-item" style="grid-column:1/-1"><div class="il">Address</div><div class="iv">${o.customer?.address || '—'}</div></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Items Ordered</div>
      ${o.items?.map(i => `<div class="order-item-row"><div class="oi-icon">${i.icon || '📦'}</div><div><div class="oi-name">${i.name}</div><div class="oi-meta">Size: ${i.size || '—'} × Qty: ${i.qty}</div></div><div class="oi-price">${fmtPrice(i.price * i.qty)}</div></div>`).join('') || '<p>No items</p>'}
      <div class="total-row"><span>Subtotal</span><span>${fmtPrice(o.subtotal)}</span></div>
      <div class="total-row"><span>Delivery</span><span>${fmtPrice(o.delivery || 350)}</span></div>
      <div class="total-row grand"><span>Total</span><span>${fmtPrice(o.total)}</span></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Update Status</div>
      <select class="status-select" id="modal-status">
        ${statuses.map(s => `<option value="${s}"${o.status === s ? ' selected' : ''}>${s}</option>`).join('')}
      </select>
      <button class="update-btn" onclick="updateStatus('${ref}')">Update Status →</button>
    </div>`;
  
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── UPDATE ORDER STATUS ──
async function updateStatus(ref) {
  const newStatus = document.getElementById('modal-status').value;
  const success = await updateStatusInSheets(ref, newStatus);
  
  if (success) {
    closeModal();
    await loadAll();
    adm_toast('Status updated → ' + newStatus);
  } else {
    adm_toast('Error updating status');
  }
}

// ── CANCEL ORDER ──
async function cancelOrder(ref) {
  if (!confirm('Cancel order ' + ref + '?')) return;
  const success = await updateStatusInSheets(ref, 'Cancelled');
  if (success) {
    await loadAll();
    adm_toast('Order cancelled');
  } else {
    adm_toast('Error cancelling order');
  }
}

// ── SEED LOCAL ORDERS (for testing) ──
function seedLocalOrders() {
  const sampleOrder = {
    ref: 'WDY-TEST001',
    date: new Date().toISOString(),
    status: 'Pending',
    customer: {
      name: 'Test Customer',
      phone: '+94 77 123 4567',
      email: 'test@example.com',
      address: '123 Test St',
      city: 'Colombo',
      province: 'Western'
    },
    items: [{ name: 'Test Item', size: 'M', qty: 1, price: 1000, icon: '👕' }],
    subtotal: 1000,
    delivery: 350,
    total: 1350,
    payment: 'card'
  };
  
  // Save to localStorage for testing
  let orders = JSON.parse(localStorage.getItem('windy_orders') || '[]');
  orders.unshift(sampleOrder);
  localStorage.setItem('windy_orders', JSON.stringify(orders));
  
  loadAll();
  adm_toast('Test order added to localStorage');
}

// ── REVENUE PAGE ──
function renderRevenue() {
  const orders = currentOrders.filter(o => o.status !== 'Cancelled');
  const total = orders.reduce((s, o) => s + o.total, 0);
  const avg = orders.length ? Math.round(total / orders.length) : 0;
  
  document.getElementById('rev-stats').innerHTML = `
    <div class="stat-card"><div class="sc-label">Gross Revenue</div><div class="sc-val sc-accent">${fmtPrice(total)}</div></div>
    <div class="stat-card"><div class="sc-label">Average Order</div><div class="sc-val">${fmtPrice(avg)}</div></div>
    <div class="stat-card"><div class="sc-label">Orders</div><div class="sc-val">${orders.length}</div></div>
    <div class="stat-card"><div class="sc-label">Delivery Revenue</div><div class="sc-val">${fmtPrice(orders.length * 350)}</div></div>`;
  
  document.getElementById('rev-by-product').innerHTML = '<p style="color:var(--dim);font-size:11px">Data from Google Sheets</p>';
  document.getElementById('rev-by-payment').innerHTML = '<p style="color:var(--dim);font-size:11px">Data from Google Sheets</p>';
  document.getElementById('rev-by-status').innerHTML = '<p style="color:var(--dim);font-size:11px">Data from Google Sheets</p>';
  document.getElementById('top-customers').innerHTML = '<p style="color:var(--dim);font-size:11px">Data from Google Sheets</p>';
}

// ── CUSTOMERS PAGE ──
function renderCustomers() {
  document.getElementById('cust-stats').innerHTML = `
    <div class="stat-card"><div class="sc-label">Total Customers</div><div class="sc-val">${currentOrders.length}</div></div>
    <div class="stat-card"><div class="sc-label">Total Orders</div><div class="sc-val">${currentOrders.length}</div></div>
    <div class="stat-card"><div class="sc-label">Revenue</div><div class="sc-val sc-accent">${fmtPrice(currentOrders.reduce((s, o) => s + o.total, 0))}</div></div>
    <div class="stat-card"><div class="sc-label">Pending</div><div class="sc-val sc-red">${currentOrders.filter(o => o.status === 'Pending').length}</div></div>`;
  
  const tb = document.getElementById('customers-tbody');
  const customers = {};
  currentOrders.forEach(o => {
    const name = o.customer?.name || 'Unknown';
    if (!customers[name]) {
      customers[name] = { name, phone: o.customer?.phone, email: o.customer?.email, city: o.customer?.city, orders: 0, total: 0, last: o.date };
    }
    customers[name].orders++;
    customers[name].total += o.total;
    if (new Date(o.date) > new Date(customers[name].last)) customers[name].last = o.date;
  });
  
  tb.innerHTML = Object.values(customers).map(c => `
    <tr>
      <td><strong style="font-family:\'Cormorant Garamond\',serif;font-size:14px">${c.name}</strong></td>
      <td>${c.phone || '—'}</td>
      <td style="color:var(--mid)">${c.email || '—'}</td>
      <td style="color:var(--mid)">${c.city || '—'}</td>
      <td style="text-align:center">${c.orders}</td>
      <td style="font-family:\'DM Mono\',monospace">${fmtPrice(c.total)}</td>
      <td style="color:var(--mid);font-size:10px">${fmtDate(c.last)}</td>
    </tr>
  `).join('');
}

// ── PAGE NAVIGATION ──
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
  
  const titles = { orders: 'Orders', revenue: 'Revenue', customers: 'Customers', settings: 'Settings' };
  document.getElementById('page-title').textContent = titles[id] || id;
  
  if (id === 'revenue') renderRevenue();
  if (id === 'customers') renderCustomers();
}

// ── EXPORT ──
function exportOrders() {
  const blob = new Blob([JSON.stringify(currentOrders, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'windy_orders_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  adm_toast('Exported ' + currentOrders.length + ' orders');
}

function clearOrders() {
  if (!confirm('Delete ALL orders from localStorage? (Google Sheets data remains)')) return;
  localStorage.removeItem('windy_orders');
  loadAll();
  adm_toast('Local orders cleared');
}

// ── CLOCK ──
function startClock() {
  const el = document.getElementById('sb-time');
  setInterval(() => { el.textContent = new Date().toLocaleTimeString('en-GB'); }, 1000);
}

// ── TOAST ──
function adm_toast(msg) {
  const t = document.getElementById('adm-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── INITIAL LOAD ──
document.addEventListener('DOMContentLoaded', () => {
  // Check if already logged in
  if (document.getElementById('app').style.display === 'flex') {
    loadAll();
  }
});
</script>
